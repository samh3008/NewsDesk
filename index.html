<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090f;
      --surface: #0d1119;
      --surface2: #111722;
      --surface3: #161e2c;
      --border: #1a2235;
      --border-soft: #131b28;
      --text: #c8c0b0;
      --text-dim: #5a6680;
      --text-muted: #3a4458;
      --text-bright: #ede5d3;
      --gold: #c8903c;
      --gold-bright: #e0a84a;
      --gold-dim: #5a3d18;
      --green: #3aad65;
      --red: #d64f4f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.5px;
    }
    .brand em { font-style: normal; color: var(--gold); }
    .header-center {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #lastUpdated {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .btn-refresh {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 5px 12px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: var(--gold-dim); }
    .btn-refresh:disabled { opacity: 0.4; cursor: default; }

/* TICKER */
.ticker-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  height: 34px;
  overflow: hidden;
  position: relative;
}
.ticker-bar::before, .ticker-bar::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0; width: 60px;
  z-index: 2; pointer-events: none;
}
.ticker-bar::before { left: 0; background: linear-gradient(to right, var(--surface2), transparent); }
.ticker-bar::after  { right: 0; background: linear-gradient(to left, var(--surface2), transparent); }
.ticker-track {
  display: flex; align-items: center;
  height: 100%; white-space: nowrap;
}
.ticker-track.animate { animation: scroll-ticker 55s linear infinite; }
.ticker-track:hover { animation-play-state: paused; }
@keyframes scroll-ticker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 22px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
  border-right: 1px solid var(--border-soft); height: 100%;
}
.t-label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.05em; }
.t-price { color: var(--text-bright); font-weight: 500; }
.t-chg { font-size: 10.5px; }
.t-chg.up   { color: var(--green); }
.t-chg.down { color: var(--red); }

/* GRID */
.main {
  max-width: 1280px; margin: 0 auto;
  padding: 24px 20px 40px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 24px; align-items: start;
}
@media (max-width: 980px) {
  .main { grid-template-columns: 1fr 1fr; }
  .section:nth-child(3) { grid-column: 1 / -1; }
}
@media (max-width: 620px) {
  .main { grid-template-columns: 1fr; padding: 16px 14px 32px; gap: 28px; }
  .section:nth-child(3) { grid-column: auto; }
  .header-center { display: none; }
}

/* SECTION */
.section-head {
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-icon { font-size: 15px; }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600; color: var(--text-bright);
}
.section-badge {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
  color: var(--text-dim); background: var(--surface3);
  border: 1px solid var(--border); padding: 1px 7px; border-radius: 2px;
}

/* CARDS */
.card { padding: 11px 0; border-bottom: 1px solid var(--border-soft); }
.card:last-child { border-bottom: none; }
.card a { text-decoration: none; color: inherit; display: block; }
.card-title {
  font-size: 13px; font-weight: 500; color: var(--text-bright);
  line-height: 1.45; margin-bottom: 5px; transition: color 0.15s;
}
.card a:hover .card-title { color: var(--gold-bright); }
.card-snippet {
  font-size: 11.5px; color: var(--text-dim); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;
}
.card-meta {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted);
}
.card-source { color: var(--gold); }
.card-img {
  width: 100%; height: 130px;
  object-fit: cover; border-radius: 3px;
  margin-bottom: 8px; opacity: 0.85;
  display: block;
}

/* STATES */
.state-box {
  padding: 28px 0; text-align: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim);
}
.state-box.loading::after {
  content: ''; display: block; margin: 12px auto 0;
  width: 24px; height: 2px; background: var(--gold-dim);
  animation: load-bar 0.9s ease-in-out infinite alternate; border-radius: 2px;
}
@keyframes load-bar {
  from { width: 8px; opacity: 0.4; }
  to   { width: 40px; opacity: 1; }
}

/* FOOTER */
.footer {
  border-top: 1px solid var(--border); padding: 18px 20px;
  text-align: center; font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em;
}
.footer a { color: var(--text-dim); text-decoration: none; }
.footer a:hover { color: var(--gold); }
.pulse {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); margin-right: 5px;
  animation: pulse-anim 2s ease infinite; vertical-align: middle;
}
@keyframes pulse-anim {
  0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
}

<body>

<header class="header">
  <div class="brand">The<em>Desk</em></div>
  <div class="header-center" id="headerDate">—</div>
  <div class="header-right">
    <span id="lastUpdated">—</span>
    <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">↺ REFRESH</button>
  </div>
</header>

<div class="ticker-bar">
  <div class="ticker-track" id="tickerTrack">
    <div class="ticker-item"><span class="t-label">LOADING MARKETS</span><span class="t-price">—</span></div>
  </div>
</div>

<main class="main">
  <section class="section">
    <div class="section-head">
      <span class="section-icon">🇮🇳</span>
      <span class="section-title">India</span>
      <span class="section-badge" id="badge-india">—</span>
    </div>
    <div id="feed-india"><div class="state-box loading">FETCHING</div></div>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-icon">🌍</span>
      <span class="section-title">World</span>
      <span class="section-badge" id="badge-global">—</span>
    </div>
    <div id="feed-global"><div class="state-box loading">FETCHING</div></div>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-icon">📊</span>
      <span class="section-title">Watchlist</span>
      <span class="section-badge" id="badge-watchlist">—</span>
    </div>
    <div id="feed-watchlist"><div class="state-box loading">FETCHING</div></div>
  </section>
</main>

<footer class="footer">
  <span class="pulse"></span>
  THE DESK &nbsp;·&nbsp; <a href="https://pages.github.com" target="_blank">GitHub Pages</a> &nbsp;·&nbsp; Powered by NewsAPI &nbsp;·&nbsp; Refreshes once daily
</footer>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────
const API_KEY  = '26c722673003494586001f6a36bea9de';
const BASE_URL = 'https://newsapi.org/v2/everything';
const PROXY_YF = 'https://corsproxy.io/?';
const YF_BASE  = 'https://query1.finance.yahoo.com/v8/finance/chart/';

// Cache key prefix + TTL (once per day)
const QUERIES = {
  india: {
    q: '(Nifty OR Sensex OR "Indian market" OR RBI OR SEBI OR "Indian economy" OR "Indian rupee" OR FII OR DII OR "India GDP" OR "India inflation") AND (india OR indian)',
    language: 'en',
    sortBy: 'publishedAt',
    pageSize: 20,
  },
  global: {
    q: '"Federal Reserve" OR "Fed rate" OR "Bank of Japan" OR ECB OR PBOC OR "China economy" OR "Japan economy" OR "Asian markets" OR "emerging markets" OR "EM flows" OR "dollar index" OR "bond yields" OR "oil prices" OR "crude oil" OR "commodity prices" OR "gold price" OR inflation OR "trade war" OR "Middle East" OR Iran OR geopolitics OR "US economy" OR "global recession" OR yuan OR yen OR "US-China"',
    language: 'en',
    sortBy: 'publishedAt',
    pageSize: 20,
  },
  watchlist: {
    q: '"HDFC Bank" OR "ICICI Bank" OR "Axis Bank" OR "Kotak Bank" OR "State Bank of India" OR "Jio Financial" OR "CAMS" OR "CDSL" OR "Radico Khaitan" OR "Titan Company" OR "Ethos Ltd" OR "Manyavar" OR "Indian Hotels" OR "ITC Hotels" OR "ITC Ltd" OR "SJS Enterprises" OR "Reliance Industries" OR "Uno Minda" OR "Minda Industries" OR "Home First Finance" OR "DMart" OR "Hero MotoCorp" OR "Emami" OR "CCAvenue" OR "Infibeam" OR "Pine Labs" OR "TVS Motor" OR "Motherson Sumi" OR "Premier Energies" OR "NTPC Green" OR "JSW Energy" OR "Suzlon" OR "KEC International" OR "Apar Industries" OR "Netweb Technologies" OR "Dixon Technologies" OR "Anant Raj" OR "Techno Electric" OR "E2E Networks" OR "Infosys" OR "Tech Mahindra" OR "KIMS" OR "Dr Lal PathLabs" OR "Vijaya Diagnostic" OR "Krsnaa"',
    language: 'en',
    sortBy: 'publishedAt',
    pageSize: 20,
  },
};

const MARKET_SYMBOLS = [
  { sym: '^NSEI',     label: 'NIFTY 50',   dec: 2 },
  { sym: '^BSESN',    label: 'SENSEX',     dec: 2 },
  { sym: '^NSEBANK',  label: 'BANK NIFTY', dec: 2 },
  { sym: 'USDINR=X',  label: 'USD/INR',    dec: 4 },
  { sym: '^INDIAVIX', label: 'INDIA VIX',  dec: 2 },
];

// ── HELPERS ──────────────────────────────────────────────────────────
function timeAgo(str) {
  if (!str) return '';
  const diff = Math.floor((Date.now() - new Date(str)) / 60000);
  if (isNaN(diff) || diff < 0) return 'just now';
  if (diff < 1)  return 'just now';
  if (diff < 60) return diff + 'm ago';
  const h = Math.floor(diff / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtNum(n, dec) {
  if (n == null) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// ── CACHE (once per calendar day via localStorage) ───────────────────
function todayKey(key) {
  const d = new Date();
  const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  return key + '_' + dateStr;
}

function cacheGet(key) {
  try {
    const raw = localStorage.getItem(todayKey(key));
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(_) { return null; }
}

function cacheSet(key, data) {
  try {
    // Prune old keys to keep localStorage clean
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('desk_') && k !== todayKey(key)) localStorage.removeItem(k);
    });
    localStorage.setItem(todayKey(key), JSON.stringify(data));
  } catch(_) {}
}

// ── NEWSAPI FETCH ─────────────────────────────────────────────────────
async function fetchNews(panelKey) {
  const cached = cacheGet('desk_' + panelKey);
  if (cached) return cached;

  const params = new URLSearchParams({ ...QUERIES[panelKey], apiKey: API_KEY });
  const res  = await fetch(BASE_URL + '?' + params.toString(), { signal: AbortSignal.timeout(12000) });
  const json = await res.json();

  if (json.status !== 'ok') throw new Error(json.message || 'NewsAPI error');

  const articles = (json.articles || [])
    .filter(a => a.title && a.title !== '[Removed]')
    .map(a => ({
      title:   a.title,
      desc:    a.description || '',
      url:     a.url,
      source:  a.source?.name || '',
      image:   a.urlToImage || null,
      pubDate: a.publishedAt,
    }));

  cacheSet('desk_' + panelKey, articles);
  return articles;
}

// ── PANEL RENDERER ────────────────────────────────────────────────────
async function loadPanel(panelKey, containerId, badgeId, showImages) {
  const el    = document.getElementById(containerId);
  const badge = document.getElementById(badgeId);

  try {
    const articles = await fetchNews(panelKey);
    badge.textContent = articles.length || '—';

    if (!articles.length) {
      el.innerHTML = '<div class="state-box">No articles found.</div>';
      return;
    }

    el.innerHTML = articles.map((a, i) => {
      const imgHtml = (showImages && i === 0 && a.image)
        ? `<img class="card-img" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : '';
      const snippet = a.desc ? a.desc.slice(0, 120) + '…' : '';
      return `<div class="card">
        <a href="${a.url}" target="_blank" rel="noopener noreferrer">
          ${imgHtml}
          <div class="card-title">${a.title}</div>
          ${snippet ? `<div class="card-snippet">${snippet}</div>` : ''}
          <div class="card-meta">
            <span class="card-source">${a.source}</span>
            <span>·</span>
            <span>${timeAgo(a.pubDate)}</span>
          </div>
        </a>
      </div>`;
    }).join('');
  } catch(err) {
    badge.textContent = '!';
    el.innerHTML = `<div class="state-box">Failed to load — ${err.message}</div>`;
  }
}

// ── MARKET TICKER ─────────────────────────────────────────────────────
async function fetchQuote(sym) {
  try {
    const url  = PROXY_YF + encodeURIComponent(YF_BASE + sym + '?interval=1d&range=1d');
    const res  = await fetch(url, { signal: AbortSignal.timeout(7000) });
    const json = await res.json();
    const meta = json?.chart?.result?.[0]?.meta;
    if (!meta) return null;
    return { price: meta.regularMarketPrice, prev: meta.previousClose ?? meta.chartPreviousClose };
  } catch(_) { return null; }
}

async function loadTicker() {
  const track = document.getElementById('tickerTrack');
  track.classList.remove('animate');
  const results = await Promise.allSettled(MARKET_SYMBOLS.map(m => fetchQuote(m.sym)));
  const items = MARKET_SYMBOLS.map((m, i) => {
    const q     = results[i].status === 'fulfilled' ? results[i].value : null;
    const price = q?.price, prev = q?.prev;
    const pct   = (price && prev) ? ((price - prev) / prev * 100) : null;
    const dir   = pct == null ? '' : pct > 0 ? 'up' : pct < 0 ? 'down' : '';
    const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '';
    const chgStr = pct != null ? `${arrow} ${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%` : '';
    return `<div class="ticker-item">
      <span class="t-label">${m.label}</span>
      <span class="t-price">${price ? fmtNum(price, m.dec) : '—'}</span>
      ${chgStr ? `<span class="t-chg ${dir}">${chgStr}</span>` : ''}
    </div>`;
  });
  track.innerHTML = items.join('') + items.join('');
  track.classList.add('animate');
}

// ── HEADER ────────────────────────────────────────────────────────────
function updateHeader() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
  const t = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('lastUpdated').innerHTML = '<span class="pulse"></span>Updated ' + t + ' IST';
}

// ── BOOT ──────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↺ LOADING';

  // Clear today's cache on manual refresh so user can force a fresh pull
  ['india','global','watchlist'].forEach(k => {
    try { localStorage.removeItem(todayKey('desk_' + k)); } catch(_) {}
  });

  ['feed-india','feed-global','feed-watchlist'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="state-box loading">FETCHING</div>';
  });

  await Promise.allSettled([
    loadTicker(),
    loadPanel('india',     'feed-india',     'badge-india',     true),
    loadPanel('global',    'feed-global',    'badge-global',    true),
    loadPanel('watchlist', 'feed-watchlist', 'badge-watchlist', false),
  ]);

  updateHeader();
  btn.disabled = false;
  btn.textContent = '↺ REFRESH';
}

updateHeader();
setInterval(updateHeader, 60000);

// On page load: serve from cache if available, else fetch
(async () => {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↺ LOADING';
  ['feed-india','feed-global','feed-watchlist'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="state-box loading">FETCHING</div>';
  });
  await Promise.allSettled([
    loadTicker(),
    loadPanel('india',     'feed-india',     'badge-india',     true),
    loadPanel('global',    'feed-global',    'badge-global',    true),
    loadPanel('watchlist', 'feed-watchlist', 'badge-watchlist', false),
  ]);
  updateHeader();
  btn.disabled = false;
  btn.textContent = '↺ REFRESH';
})();
</script>
